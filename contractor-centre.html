<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Contractor Centre</title><link rel="stylesheet" href="/styles.css"><style>.wrap{max-width:1100px;margin:25px auto;padding:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}.card{background:#fff;border:1px solid #dbe8f8;border-radius:14px;padding:18px}.btn{background:#0057A8;color:white;border:0;border-radius:8px;padding:10px 14px;cursor:pointer}.light{background:#eaf4ff;color:#0057A8}.row{padding:10px;border-bottom:1px solid #eef3f8}input,select,textarea{width:100%;padding:10px;margin:7px 0 12px;border:1px solid #ccd8e5;border-radius:8px}textarea{min-height:160px}</style></head><body><main class="wrap"><h1>Contractor Centre</h1><p>Manage approved contractors, create job links, and copy ready-made request templates.</p><div class="grid"><section class="card"><h2>Create Contractor Job Link</h2><label>Property</label><select id="propertyId"></select><label>Contractor</label><select id="contractorId"></select><label>Compliance Type</label><select id="type"><option>Gas Safety</option><option>EICR</option><option>PAT Testing</option><option>EPC</option><option>Legionella</option><option>Smoke & CO Alarms</option><option>Fire Safety</option></select><label>Landlord Phone</label><input id="phone"><label>Landlord Company</label><input id="company"><label>Message</label><textarea id="message">Hi, my compliance certificate is due. Please can you provide a quote and availability for this job?</textarea><button class="btn" onclick="createJob()">Generate Contractor Link</button><p id="linkOut"></p></section><section class="card"><h2>Ready-Made Templates</h2><select id="templateType" onchange="makeTemplate()"><option>Gas Safety</option><option>EICR</option><option>PAT Testing</option><option>EPC</option><option>Legionella</option></select><textarea id="templateText"></textarea><button class="btn light" onclick="copyTemplate()">Copy Template</button></section></div><section class="card"><h2>Contractor Jobs</h2><div id="jobs">Loading...</div></section><section class="card"><h2>Approved Contractors</h2><div id="contractors">Loading...</div></section></main><script>let appData={};async function load(){appData=await (await fetch('/api/app')).json();propertyId.innerHTML=(appData.properties||[]).map(p=>`<option value="${p.id}">${p.address}</option>`).join('');contractorId.innerHTML=(appData.contractors||[]).map(c=>`<option value="${c.id}">${c.company} - ${c.trade}</option>`).join('');contractors.innerHTML=(appData.contractors||[]).map(c=>`<div class="row"><b>${c.company}</b><br>${c.trade||''} | ${c.email||''} | ${c.phone||''}</div>`).join('')||'No contractors yet.';makeTemplate();loadJobs();}async function loadJobs(){const r=await fetch('/api/contractor-jobs');const js=await r.json();jobs.innerHTML=(js||[]).map(j=>`<div class="row"><b>${j.complianceType}</b> - ${j.propertyAddress}<br>Contractor: ${j.contractorName||'Not selected'} | Status: <b>${j.status}</b> | Booked: ${j.bookedDate||'Not booked'} ${j.bookedTime||''}<br>Quote: ${j.quotedPrice||'Awaiting quote'}<br>${j.contractorNotes||''}</div>`).join('')||'No contractor jobs yet.';}function selectedProperty(){return (appData.properties||[]).find(p=>p.id===propertyId.value)||{};}function selectedContractor(){return (appData.contractors||[]).find(c=>c.id===contractorId.value)||{};}function makeTemplate(){const p=selectedProperty();const c=selectedContractor();const t=templateType.value;templateText.value=`Hi ${c.contactName||c.company||''},\n\nMy ${t} certificate/check is due for renewal.\n\nPlease can you provide a quote and your earliest availability?\n\nProperty address:\n${p.address||'[Property Address]'}\n\nLandlord details:\nName: ${appData.user?.name||''}\nCompany: ${company?.value||'[Company Name]'}\nEmail: ${appData.user?.email||''}\nPhone: ${phone?.value||'[Phone Number]'}\n\nKind regards,\n${appData.user?.name||''}`;}async function copyTemplate(){await navigator.clipboard.writeText(templateText.value);alert('Template copied.');}async function createJob(){const c=selectedContractor();const p=selectedProperty();const r=await fetch('/api/contractor-jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({propertyId:p.id,contractorId:c.id,contractorName:c.company,contractorEmail:c.email,complianceType:type.value,landlordPhone:phone.value,landlordCompany:company.value,message:message.value})});const out=await r.json();if(out.contractorLink){linkOut.innerHTML=`<b>Send this link to contractor:</b><br><input value="${out.contractorLink}" onclick="this.select()">`;loadJobs();}else alert(out.error||'Could not create job');}load();</script></body></html>
