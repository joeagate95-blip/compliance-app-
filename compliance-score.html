<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Compliance Score</title><link rel="stylesheet" href="/styles.css"><style>.wrap{max-width:1100px;margin:25px auto;padding:20px}.card{background:white;border:1px solid #dbe8f8;border-radius:14px;padding:18px;margin:14px 0}.score{font-size:34px;font-weight:bold;color:#0057A8}.bad{color:#c62828}.warn{color:#b26a00}.good{color:#157347}</style></head><body><main class="wrap"><h1>Property Compliance Scores</h1><div id="scores"></div></main><script>let data={};const required=['Gas Safety','EICR','EPC','Legionella','Smoke & CO Alarms'];function calc(p){const docs=(data.documents||[]).filter(d=>d.propertyId===p.id);let score=100, issues=[];const now=new Date();for(const r of required){const ds=docs.filter(d=>d.category===r);if(!ds.length){score-=15;issues.push(`Missing ${r}`);continue;}const latest=ds.sort((a,b)=>(b.expiryDate||'').localeCompare(a.expiryDate||''))[0];if(latest.expiryDate && new Date(latest.expiryDate)<now){score-=20;issues.push(`${r} expired`);} }if(!p.lastConditionReview){score-=10;issues.push('No Property Condition Review recorded');}score=Math.max(0,score);return{score,issues};}async function load(){data=await(await fetch('/api/app')).json();scores.innerHTML=(data.properties||[]).map(p=>{const r=calc(p);const cls=r.score>=85?'good':r.score>=60?'warn':'bad';return `<div class="card"><h2>${p.address}</h2><div class="score ${cls}">${r.score}%</div><p>${r.issues.length?r.issues.join('<br>'):'No major issues found.'}</p></div>`}).join('')||'No properties found.';}load();</script></body></html>
