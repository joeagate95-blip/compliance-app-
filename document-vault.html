<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document Vault</title><link rel="stylesheet" href="/styles.css"><style>.wrap{max-width:1100px;margin:25px auto;padding:20px}.card{background:white;border:1px solid #dbe8f8;border-radius:14px;padding:18px}.row{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr;gap:12px;padding:12px;border-bottom:1px solid #eef3f8}.head{font-weight:bold;background:#eaf4ff;border-radius:8px}input{width:100%;padding:12px;border:1px solid #ccd8e5;border-radius:8px;margin-bottom:16px}</style></head><body><main class="wrap"><h1>Document Vault</h1><input id="q" placeholder="Search by property, category, title, status..." oninput="render()"><div class="card"><div class="row head"><div>Document</div><div>Property</div><div>Category</div><div>Expiry</div><div>File</div></div><div id="list"></div></div></main><script>let data={};async function load(){data=await(await fetch('/api/app')).json();render();}function render(){const term=(q.value||'').toLowerCase();const props=Object.fromEntries((data.properties||[]).map(p=>[p.id,p.address]));const docs=(data.documents||[]).filter(d=>`${d.title} ${d.category} ${d.status} ${props[d.propertyId]||''}`.toLowerCase().includes(term));list.innerHTML=docs.map(d=>`<div class="row"><div><b>${d.title}</b><br>${d.status||''}</div><div>${props[d.propertyId]||''}</div><div>${d.category||''}</div><div>${d.expiryDate||'No expiry'}</div><div>${d.fileName?`<a href="/api/download/${d.fileName}">Download</a>`:'No file'}</div></div>`).join('')||'<p>No documents found.</p>';}load();</script></body></html>
