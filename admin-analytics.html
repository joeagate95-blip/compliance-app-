<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Analytics</title><link rel="stylesheet" href="/styles.css"><style>.wrap{max-width:1100px;margin:25px auto;padding:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}.card{background:white;border:1px solid #dbe8f8;border-radius:14px;padding:18px}.num{font-size:32px;font-weight:bold;color:#0057A8}</style></head><body><main class="wrap"><h1>Admin Analytics Dashboard</h1><div id="grid" class="grid"></div></main><script>async function load(){const r=await fetch('/api/admin-analytics');const d=await r.json();if(d.error){grid.innerHTML='<p>Admin only.</p>';return;}const labels={users:'Total Users',landlords:'Landlords',agents:'Letting Agents',contractors:'Contractors',tenants:'Tenants',properties:'Properties',documents:'Documents',expired:'Expired Items',dueSoon:'Due Soon',maintenanceOpen:'Open Maintenance',contractorJobs:'Contractor Jobs',bookedJobs:'Booked Jobs'};grid.innerHTML=Object.keys(labels).map(k=>`<div class="card"><div class="num">${d[k]}</div><div>${labels[k]}</div></div>`).join('');}load();</script></body></html>
