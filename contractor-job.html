<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Contractor Job Portal</title><link rel="stylesheet" href="/styles.css"><style>.wrap{max-width:900px;margin:30px auto;padding:20px}.box{background:#fff;border:1px solid #d8e6f7;border-radius:12px;padding:20px;margin:15px 0}.btn{background:#0057A8;color:white;border:0;border-radius:8px;padding:12px 16px}.status{display:inline-block;background:#eaf4ff;color:#0057A8;padding:6px 10px;border-radius:8px;font-weight:bold}input,select,textarea{width:100%;padding:10px;margin:8px 0 14px;border:1px solid #ccd8e5;border-radius:8px}</style></head><body><main class="wrap"><h1>Contractor Job Portal</h1><div id="job" class="box">Loading...</div><div class="box"><h2>Update Job</h2><form id="f"><label>Status</label><select id="status"><option>Requested</option><option>Quote Sent</option><option>Booked In</option><option>Completed</option><option>Unable To Attend</option></select><label>Quoted Price (£)</label><input id="quotedPrice"><label>Booked Date</label><input type="date" id="bookedDate"><label>Booked Time</label><input type="time" id="bookedTime"><label>Notes</label><textarea id="contractorNotes" rows="5"></textarea><button class="btn">Save Update</button></form><p id="msg"></p></div></main><script>const token=location.pathname.split('/').pop();async function load(){const r=await fetch('/api/contractor-job/'+token);const j=await r.json();if(j.error){document.getElementById('job').innerHTML='<p>Job not found.</p>';return;}document.getElementById('job').innerHTML=`<h2>${j.complianceType}</h2><p><b>Property:</b> ${j.propertyAddress}</p><p><b>Landlord:</b> ${j.landlordName}</p><p><b>Email:</b> ${j.landlordEmail}</p><p><b>Phone:</b> ${j.landlordPhone||''}</p><p><b>Company:</b> ${j.landlordCompany||''}</p><p><b>Message:</b><br>${j.message||''}</p><p><span class="status">${j.status}</span></p>`;status.value=j.status||'Requested';quotedPrice.value=j.quotedPrice||'';bookedDate.value=j.bookedDate||'';bookedTime.value=j.bookedTime||'';contractorNotes.value=j.contractorNotes||'';}document.getElementById('f').onsubmit=async e=>{e.preventDefault();const r=await fetch('/api/contractor-job/'+token+'/update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:status.value,quotedPrice:quotedPrice.value,bookedDate:bookedDate.value,bookedTime:bookedTime.value,contractorNotes:contractorNotes.value})});const out=await r.json();msg.textContent=out.success?'Job updated successfully.':'Update failed.';load();};load();</script></body></html>
