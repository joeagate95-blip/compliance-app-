<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contractor Job Portal</title>
  <link rel="stylesheet" href="/styles.css">

  <style>
    .wrap{max-width:900px;margin:30px auto;padding:20px}
    .box{background:#fff;border:1px solid #d8e6f7;border-radius:12px;padding:20px;margin:15px 0}
    .btn{background:#0057A8;color:white;border:0;border-radius:8px;padding:12px 16px;cursor:pointer;margin:5px 0}
    .status{display:inline-block;background:#eaf4ff;color:#0057A8;padding:6px 10px;border-radius:8px;font-weight:bold}
    .notice{background:#fff8e1;border:1px solid #f0d98c;padding:12px;border-radius:8px;margin:12px 0}
    .success{color:green;font-weight:bold}
    .error{color:red;font-weight:bold}
    .slot{background:#fff;border:1px solid #d8e6f7;border-radius:10px;padding:15px;margin:12px 0}
    input,select,textarea{width:100%;padding:10px;margin:8px 0 14px;border:1px solid #ccd8e5;border-radius:8px;box-sizing:border-box}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:700px){.grid2{grid-template-columns:1fr}}
  </style>
</head>

<body>
<main class="wrap">
  <h1>Contractor Job Portal</h1>

  <div id="job" class="box">Loading...</div>

  <div class="box">
    <h2>Update Job</h2>

    <form id="f">
      <label>Status</label>
      <select id="status">
        <option>Requested</option>
        <option>Quote Sent</option>
        <option>Booked In</option>
        <option>Completed</option>
        <option>Unable To Attend</option>
      </select>

      <label>Quoted Price (£)</label>
      <input id="quotedPrice">

      <label>Booked Date</label>
      <input type="date" id="bookedDate">

      <label>Booked Time</label>
      <input type="time" id="bookedTime">

      <label>Notes</label>
      <textarea id="contractorNotes" rows="5"></textarea>

      <button class="btn">Save Update</button>
    </form>

    <p id="msg"></p>
  </div>

  <div class="box">
    <h2>Propose Appointment Slots</h2>

    <p class="notice">
      Offer up to 5 appointment options. Set a response deadline so the tenant must choose before the slots are released.
    </p>

    <div id="existingSlots"></div>

    <h3>Tenant Response Deadline</h3>

    <label>Quick Deadline</label>
    <select id="deadlinePreset" onchange="applyDeadlinePreset()">
      <option value="48">48 hours from now</option>
      <option value="24">24 hours from now</option>
      <option value="72">72 hours from now</option>
      <option value="custom">Custom date and time</option>
    </select>

    <label>Response Deadline Date</label>
    <input type="date" id="slotsExpiryDate">

    <label>Response Deadline Time</label>
    <input type="time" id="slotsExpiryTime">

    <div id="slotsContainer"></div>

    <button type="button" class="btn" onclick="saveAppointmentSlots()">Save Proposed Appointment Slots</button>

    <p id="slotMsg"></p>
  </div>
</main>

<script>
const token = location.pathname.split('/').pop();
let currentJob = null;

function pad(n){
  return String(n).padStart(2,'0');
}

function setDeadlineFromHours(hours){
  const d = new Date();
  d.setHours(d.getHours() + Number(hours));

  const yyyy = d.getFullYear();
  const mm = pad(d.getMonth() + 1);
  const dd = pad(d.getDate());
  const hh = pad(d.getHours());
  const min = pad(d.getMinutes());

  document.getElementById('slotsExpiryDate').value = `${yyyy}-${mm}-${dd}`;
  document.getElementById('slotsExpiryTime').value = `${hh}:${min}`;
}

function applyDeadlinePreset(){
  const preset = document.getElementById('deadlinePreset').value;

  if(preset === 'custom'){
    document.getElementById('slotsExpiryDate').value = '';
    document.getElementById('slotsExpiryTime').value = '';
    return;
  }

  setDeadlineFromHours(preset);
}

function slotText(slot){
  if(!slot || !slot.date) return '';
  if(slot.type === 'AM') return `${slot.date} - AM slot`;
  if(slot.type === 'PM') return `${slot.date} - PM slot`;
  return `${slot.date} - ${slot.startTime || ''} to ${slot.endTime || ''}`;
}

function renderSlotInputs(){
  const box = document.getElementById('slotsContainer');
  box.innerHTML = '';

  for(let i = 1; i <= 5; i++){
    box.innerHTML += `
      <div class="slot">
        <h3>Slot ${i}</h3>

        <label>Date</label>
        <input type="date" id="slotDate${i}">

        <label>Slot Type</label>
        <select id="slotType${i}" onchange="toggleCustomTimes(${i})">
          <option value="">Select slot type</option>
          <option value="AM">AM slot</option>
          <option value="PM">PM slot</option>
          <option value="Custom">Custom time slot</option>
        </select>

        <div id="customTimes${i}" class="grid2" style="display:none">
          <div>
            <label>Start Time</label>
            <input type="time" id="slotStart${i}">
          </div>

          <div>
            <label>End Time</label>
            <input type="time" id="slotEnd${i}">
          </div>
        </div>
      </div>
    `;
  }
}

function toggleCustomTimes(i){
  const type = document.getElementById(`slotType${i}`).value;
  document.getElementById(`customTimes${i}`).style.display = type === 'Custom' ? 'grid' : 'none';
}

function populateSlots(job){
  const slots = job.appointmentSlots || [];
  const existing = document.getElementById('existingSlots');

  if(job.slotsExpiryDate){
    document.getElementById('slotsExpiryDate').value = job.slotsExpiryDate || '';
    document.getElementById('slotsExpiryTime').value = job.slotsExpiryTime || '';
    document.getElementById('deadlinePreset').value = 'custom';
  } else {
    setDeadlineFromHours(48);
  }

  if(!slots.length){
    existing.innerHTML = '<p class="notice">No appointment slots proposed yet.</p>';
    return;
  }

  existing.innerHTML = `
    <h3>Current Proposed Slots</h3>
    <ul>
      ${slots.map(s => `<li>${slotText(s)} - ${s.status || 'Proposed'}</li>`).join('')}
    </ul>
    <p><b>Slots expire:</b> ${job.slotsExpiryDate || 'Not set'} ${job.slotsExpiryTime || ''}</p>
  `;

  slots.slice(0,5).forEach((slot,index)=>{
    const i = index + 1;
    document.getElementById(`slotDate${i}`).value = slot.date || '';
    document.getElementById(`slotType${i}`).value = slot.type || '';
    document.getElementById(`slotStart${i}`).value = slot.startTime || '';
    document.getElementById(`slotEnd${i}`).value = slot.endTime || '';
    toggleCustomTimes(i);
  });
}

async function load(){
  const r = await fetch('/api/contractor-job/' + token);
  const j = await r.json();
  currentJob = j;

  if(j.error){
    document.getElementById('job').innerHTML = '<p>Job not found.</p>';
    return;
  }

  const reportLink = j.maintenanceReportUrl
    ? `<p><b>Tenant Maintenance Report:</b><br><a href="${j.maintenanceReportUrl}" target="_blank">View / Download Report</a></p>`
    : '';

  const quoteNotice = j.quoteStatus === 'Pending'
    ? `<p class="error">Quote awaiting landlord approval.</p>`
    : j.quoteStatus === 'Accepted'
      ? `<p class="success">Quote accepted by landlord. You can now arrange booking.</p>`
      : j.quoteStatus === 'Rejected'
        ? `<p class="error">Quote rejected by landlord. Please revise your quote or contact the landlord.</p>`
        : '';

  const contractorNotification = j.contractorNotification
    ? `<p class="notice"><b>Landlord Update:</b><br>${j.contractorNotification}</p>`
    : '';

  document.getElementById('job').innerHTML = `
    <h2>${j.complianceType || 'Contractor Job'}</h2>
    <p><b>Property:</b> ${j.propertyAddress || ''}</p>
    <p><b>Landlord:</b> ${j.landlordName || ''}</p>
    <p><b>Email:</b> ${j.landlordEmail || ''}</p>
    <p><b>Phone:</b> ${j.landlordPhone || ''}</p>
    <p><b>Company:</b> ${j.landlordCompany || ''}</p>
    ${reportLink}
    <p><b>Message:</b><br>${j.message || ''}</p>
    <p><span class="status">${j.status || 'Requested'}</span></p>
    ${quoteNotice}
    ${contractorNotification}
  `;

  status.value = j.status || 'Requested';
  quotedPrice.value = j.quotedPrice || '';
  bookedDate.value = j.bookedDate || '';
  bookedTime.value = j.bookedTime || '';
  contractorNotes.value = j.contractorNotes || '';

  renderSlotInputs();
  populateSlots(j);
}

document.getElementById('f').onsubmit = async e => {
  e.preventDefault();

  const r = await fetch('/api/contractor-job/' + token + '/update',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      status:status.value,
      quotedPrice:quotedPrice.value,
      bookedDate:bookedDate.value,
      bookedTime:bookedTime.value,
      contractorNotes:contractorNotes.value
    })
  });

  const out = await r.json();

  msg.className = out.success ? 'success' : 'error';
  msg.textContent = out.success ? 'Job updated successfully.' : (out.error || 'Update failed.');

  load();
};

async function saveAppointmentSlots(){
  const slots = [];
  const slotMsg = document.getElementById('slotMsg');

  const expiryDate = document.getElementById('slotsExpiryDate').value;
  const expiryTime = document.getElementById('slotsExpiryTime').value;

  if(!expiryDate || !expiryTime){
    slotMsg.className = 'error';
    slotMsg.textContent = 'Tenant response deadline date and time are required.';
    return;
  }

  for(let i = 1; i <= 5; i++){
    const date = document.getElementById(`slotDate${i}`).value;
    const type = document.getElementById(`slotType${i}`).value;
    const startTime = document.getElementById(`slotStart${i}`).value;
    const endTime = document.getElementById(`slotEnd${i}`).value;

    if(date || type || startTime || endTime){
      if(!date || !type){
        slotMsg.className = 'error';
        slotMsg.textContent = `Slot ${i} needs both a date and slot type.`;
        return;
      }

      if(type === 'Custom' && (!startTime || !endTime)){
        slotMsg.className = 'error';
        slotMsg.textContent = `Slot ${i} needs start and end time.`;
        return;
      }

      slots.push({
        date,
        type,
        startTime:type === 'Custom' ? startTime : '',
        endTime:type === 'Custom' ? endTime : '',
        status:'Proposed'
      });
    }
  }

  if(!slots.length){
    slotMsg.className = 'error';
    slotMsg.textContent = 'Please add at least one appointment slot.';
    return;
  }

  const r = await fetch('/api/contractor-job/' + token + '/slots',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      appointmentSlots:slots,
      slotsExpiryDate:expiryDate,
      slotsExpiryTime:expiryTime
    })
  });

  const out = await r.json();

  if(!r.ok){
    slotMsg.className = 'error';
    slotMsg.textContent = out.error || 'Could not save appointment slots.';
    return;
  }

  slotMsg.className = 'success';
  slotMsg.textContent = 'Appointment slots saved successfully.';

  load();
}

load();
</script>
</body>
</html>
